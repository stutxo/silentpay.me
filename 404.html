  <title>silentpay.me</title>
  <script>
    (() => {
      const recipientRe = /^sp1[023456789acdefghjklmnpqrstuvwxyz]+$/i;
      let recipient = window.location.pathname.replace(/^\/+|\/+$/g, "");
      try { recipient = decodeURIComponent(recipient); }
      catch { recipient = ""; }

      const target = new URL("/", window.location.origin);
      if (recipientRe.test(recipient)) target.searchParams.set("recipient", recipient);
      window.location.replace(target);
    })();
  </script>
